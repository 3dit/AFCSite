<header class="site-header">
  <div class="top-bar">
    <div class="top-bar-inner">
      <a routerLink="/" class="logo">
        <span class="logo-text">Allergen Free Cooking</span>
      </a>
      <div class="top-bar-right">
        <div class="search-box">
          <input type="text" placeholder="Search recipes..." aria-label="Search recipes" />
          <button class="search-btn" aria-label="Search">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
          </button>
        </div>
        <a href="#" class="subscribe-link">Subscribe</a>
      </div>
    </div>
  </div>

  <nav class="main-nav">
    <div class="nav-inner">
      <button class="mobile-toggle" (click)="toggleNav()" [attr.aria-expanded]="navOpen">
        <span class="hamburger" [class.open]="navOpen"></span>
      </button>
      <ul class="nav-list" [class.open]="navOpen">
        @for (item of navItems; track item.label) {
          <li class="nav-item" [class.has-children]="item.children.length > 0">
            <a [routerLink]="item.link" routerLinkActive="active" [routerLinkActiveOptions]="{exact: item.link === '/'}">
              {{ item.label }}
            </a>
            @if (item.children.length > 0) {
              <div class="dropdown">
                <ul>
                  @for (child of item.children; track child.label) {
                    <li>
                      <a [routerLink]="child.link" [fragment]="child.fragment">{{ child.label }}</a>
                    </li>
                  }
                </ul>
              </div>
            }
          </li>
        }
      </ul>
    </div>
  </nav>
</header>
